appId: com.keithkurak.pancaketheorypreview
---
- launchApp

# Tap the "Make it" button on the home screen
- assertVisible: '.*Make it.*'
- tapOn:
    text: ".*Make it.*"

# Tap the fluffy pancake recipe from the recipe list
- assertVisible: '.*Fluffy Pancakes.*'
- tapOn:
    text: ".*Fluffy Pancakes.*"

# Verify recipe detail screen loaded, then start making it
- assertVisible: "Make it now?"
- tapOn: "Make it now?"

# Verify the recipe is now in active mode
- assertVisible: "Cancel Recipe"

# Check off all 9 ingredients (scroll each into view for smaller screens)
- scrollUntilVisible:
    element: ".*All-purpose flour.*"
    direction: DOWN
- tapOn: ".*All-purpose flour.*"
- scrollUntilVisible:
    element: ".*sugar.*"
    direction: DOWN
- tapOn: ".*sugar.*"
- scrollUntilVisible:
    element: ".*Baking powder.*"
    direction: DOWN
- tapOn: ".*Baking powder.*"
- scrollUntilVisible:
    element: ".*Baking soda.*"
    direction: DOWN
- tapOn: ".*Baking soda.*"
- scrollUntilVisible:
    element: ".*Salt.*"
    direction: DOWN
- tapOn: ".*Salt.*"
- scrollUntilVisible:
    element: ".*Milk.*"
    direction: DOWN
- tapOn: ".*Milk.*"
- scrollUntilVisible:
    element: ".*Butter.*"
    direction: DOWN
- tapOn: ".*Butter.*"
- scrollUntilVisible:
    element: ".*Vanilla extract.*"
    direction: DOWN
- tapOn: ".*Vanilla extract.*"
- scrollUntilVisible:
    element: ".*Egg.*"
    direction: DOWN
- tapOn: ".*Egg.*"

# All ingredients checked - tap "I made it!"
- assertVisible: "I made it!"
- tapOn: "I made it!"

# Rate the recipe (tap 4th star for "Good")
- assertVisible: "Tap to rate"
- tapOn:
    text: "★"
    index: 3
- assertVisible: "Good"

# Submit the feedback
- tapOn: "Done"

# Verify we landed on the history tab
- assertVisible: ".*History.*"
