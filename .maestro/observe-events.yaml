appId: com.keithkurak.pancaketheorypreview
---
# Generate Expo Observe events by navigating through screens.
# The expo-router integration logs route changes automatically,
# and starting a recipe fires a custom recipe.started event.
# Tab labels are hidden, so we use deep links to switch tabs.

- launchApp

# 1. Chooser tab (home) — loaded on launch
- assertVisible: '.*Make it.*'

# 2. Browse tab (via deep link — tab labels are hidden)
- openLink: pancaketheory:///browse
- assertVisible: '.*Pancakes.*'

# 3. Tap into a recipe detail screen
- tapOn: '.*Fluffy Pancakes.*'
- assertVisible: "Make it now?"

# 4. Start the recipe (fires recipe.started event)
- tapOn: "Make it now?"
- assertVisible: "Cancel Recipe"

# 5. Go back to browse
- back
- assertVisible: '.*Pancakes.*'

# 6. History tab (via deep link)
- openLink: pancaketheory:///history

# 7. Back to Chooser tab (via deep link)
- openLink: pancaketheory:///
- assertVisible: '.*Make it.*'

# Flush Observe events: backgrounding the app triggers auto-dispatch
- pressKey: Home
- extendedWaitUntil:
    visible: ".*"
    timeout: 5000
- launchApp
- extendedWaitUntil:
    visible: '.*Make it.*'
    timeout: 5000

# Second flush to pick up any events generated after relaunch
- pressKey: Home
- extendedWaitUntil:
    visible: ".*"
    timeout: 5000
- launchApp
- extendedWaitUntil:
    visible: '.*Make it.*'
    timeout: 5000
